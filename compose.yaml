name: testweave

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-testweave}
      POSTGRES_USER: ${POSTGRES_USER:-testweave}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请先复制 .env.example 为 .env 并设置 POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - testweave_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 5s

  postgres-test:
    profiles: ["test"]
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: testweave_test
      POSTGRES_USER: testweave
      POSTGRES_PASSWORD: local-integration-test-only
    ports:
      - "127.0.0.1:55432:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testweave -d testweave_test"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 5s

volumes:
  testweave_postgres_data:
